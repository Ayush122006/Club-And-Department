<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--text-main), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .auth-input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .auth-btn-group {
            margin-top: 10px;
        }

        .switch-auth {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .switch-auth a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .switch-auth a:hover {
            color: var(--text-main);
        }

        /* Toggling Views */
        #signupForm {
            display: none;
        }

        /* General Error Box */
        .error-message {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <!-- Background Animated Geometry -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="background: var(--accent-cyan); animation-duration: 15s;"></div>
    </div>

    <button class="btn btn-glass animate-fade-in" onclick="toggleTheme()" id="themeToggleBtn"
        style="position: fixed; top: 20px; right: 20px; padding: 10px; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; z-index: 9999;"
        title="Toggle Theme">🌓</button>

    <div class="glass-panel auth-container animate-fade-in">
        <div class="auth-header">
            <h1>Club Dashboard</h1>
            <p id="authSubtitle">Please enter your details to sign in</p>
        </div>

        <div id="errorBox" class="error-message"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="auth-input-group">
                <label>Username</label>
                <input type="text" id="loginUser" class="glass-input" placeholder="e.g. admin" required>
            </div>
            <div class="auth-input-group">
                <label>Password</label>
                <input type="password" id="loginPass" class="glass-input" placeholder="••••••••" required>
            </div>
            <div class="auth-btn-group">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </div>
            <div class="switch-auth">
                Don't have an account? <a onclick="toggleView('signup')">Sign Up</a>
            </div>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
            <div class="auth-input-group">
                <label>Choose a Username</label>
                <input type="text" id="signupUser" class="glass-input" placeholder="Create username" required>
            </div>
            <div class="auth-input-group">
                <label>Create a Password</label>
                <input type="password" id="signupPass" class="glass-input" placeholder="••••••••" required>
            </div>
            <div class="auth-btn-group">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </div>
            <div class="switch-auth">
                Already have an account? <a onclick="toggleView('login')">Sign In</a>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>

</html>
